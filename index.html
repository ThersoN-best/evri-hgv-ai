<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVRi HGV AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar div{
margin:20px 0;
cursor:pointer;
}

.main{
margin-left:240px;
padding:30px;
}

.timer{
font-size:50px;
margin:20px 0;
}

.mode{
font-size:22px;
color:#22c55e;
}

button{
display:block;
width:220px;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin:10px 0;
width:220px;
}

.history{
background:#111827;
padding:15px;
margin:10px 0;
border-radius:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>EVRi HGV AI</h2>

<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('tachograph')">Driving Hours</div>
<div onclick="showPage('history')">History</div>

</div>

<div class="main">

<div id="dashboard" class="page">

<h1>Driver Dashboard</h1>

<div class="card">
Driving Today:
<span id="driveToday">0</span> h
</div>

<div class="card">
Remaining Today:
<span id="remainToday">9</span> h
</div>

<div class="card">
Driving This Week:
<span id="weekDriving">0</span> h
</div>

<div class="card">
Extensions Used:
<span id="extensions">0</span> / 2
</div>

<div class="card">
Break after:
<span id="breakNeed">4h30</span>
</div>

</div>

<div id="tachograph" class="page" style="display:none">

<h1>Tachograph</h1>

<div class="mode">
Mode: <span id="modeText">STOP</span>
</div>

<div class="timer" id="timer">
00:00:00
</div>

<button onclick="startDriving()">🚛 DRIVING</button>
<button onclick="startBreak()">☕ BREAK</button>
<button onclick="startWork()">🔧 OTHER WORK</button>
<button onclick="startPOA()">⏳ POA</button>
<button onclick="stopAll()">🛑 STOP</button>
<button onclick="endShift()">📅 END SHIFT</button>

</div>

<div id="history" class="page" style="display:none">

<h1>Work History</h1>

<div id="historyList"></div>

</div>

</div>

<script>

let mode="stop"

let timer=0
let drivingToday=0
let weekDriving=0
let breakDriving=0
let extensions=0

let history = JSON.parse(localStorage.getItem("history") || "[]")

function showPage(page){

let pages=document.querySelectorAll(".page")

pages.forEach(p=>p.style.display="none")

document.getElementById(page).style.display="block"

renderHistory()

}

function startDriving(){

mode="driving"
document.getElementById("modeText").innerText="DRIVING"

}

function startBreak(){

mode="break"
document.getElementById("modeText").innerText="BREAK"
breakDriving=0

}

function startWork(){

mode="work"
document.getElementById("modeText").innerText="OTHER WORK"

}

function startPOA(){

mode="poa"
document.getElementById("modeText").innerText="POA"

}

function stopAll(){

mode="stop"
document.getElementById("modeText").innerText="STOP"

}

setInterval(function(){

if(mode==="stop") return

timer++

let h=Math.floor(timer/3600)
let m=Math.floor((timer%3600)/60)
let s=timer%60

document.getElementById("timer").innerText =
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

if(mode==="driving"){

drivingToday++
weekDriving++
breakDriving++

}

updateDashboard()

},1000)

function updateDashboard(){

let driveHours=(drivingToday/3600).toFixed(2)

document.getElementById("driveToday").innerText=driveHours

let remain=(9-(drivingToday/3600)).toFixed(2)

if(remain<0) remain=0

document.getElementById("remainToday").innerText=remain

document.getElementById("weekDriving").innerText=(weekDriving/3600).toFixed(2)

document.getElementById("extensions").innerText=extensions

if(breakDriving>=16200){

document.getElementById("breakNeed").innerText="BREAK NOW"

}else{

let remainBreak=(16200-breakDriving)/60

document.getElementById("breakNeed").innerText=
Math.floor(remainBreak)+" min"

}

}

function endShift(){

let date=new Date().toLocaleDateString()

let hours=(drivingToday/3600).toFixed(2)

history.push({
date:date,
driving:hours
})

localStorage.setItem("history",JSON.stringify(history))

drivingToday=0
timer=0
breakDriving=0

alert("Shift saved!")

}

function renderHistory(){

let container=document.getElementById("historyList")

container.innerHTML=""

history.reverse().forEach(day=>{

container.innerHTML+=`

<div class="history">

<b>${day.date}</b><br>

Driving: ${day.driving} h

</div>

`

})

}

showPage("dashboard")

<script>

let mode="STOP"

let driving=0
let work=0
let breakTime=0
let poa=0

let weekDriving=0
let twoWeekDriving=0

let extensions=0
let reducedBreaks=0

let timer=null

function startTimer(){

if(timer) clearInterval(timer)

timer=setInterval(()=>{

if(mode==="DRIVING"){
driving+=1
weekDriving+=1
twoWeekDriving+=1
}

if(mode==="WORK"){
work+=1
}

if(mode==="BREAK"){
breakTime+=1
}

if(mode==="POA"){
poa+=1
}

updateDashboard()

},1000)

}

function setMode(m){

mode=m

document.getElementById("mode").innerText="Mode: "+m

if(m!=="STOP") startTimer()

}

function stopShift(){

mode="STOP"

clearInterval(timer)

saveHistory()

}

function updateDashboard(){

document.getElementById("drivingToday").innerText=(driving/3600).toFixed(2)+" h"

document.getElementById("remainingDriving").innerText=(9-(driving/3600)).toFixed(2)+" h"

document.getElementById("weekDriving").innerText=(weekDriving/3600).toFixed(2)+" h"

document.getElementById("twoWeekDriving").innerText=(twoWeekDriving/3600).toFixed(2)+" h"

document.getElementById("extensions").innerText=extensions+" / 2"

if(driving>=16200){
document.getElementById("breakWarning").innerText="BREAK REQUIRED"
}else{
document.getElementById("breakWarning").innerText="Break after 4h30 driving"
}

}

function saveHistory(){

let history=JSON.parse(localStorage.getItem("history")||"[]")

let today=new Date().toLocaleDateString()

history.push({

date:today,
driving:(driving/3600).toFixed(2),
work:(work/3600).toFixed(2),
break:(breakTime/3600).toFixed(2),
poa:(poa/3600).toFixed(2)

})

localStorage.setItem("history",JSON.stringify(history))

loadHistory()

}

function loadHistory(){

let history=JSON.parse(localStorage.getItem("history")||"[]")

let div=document.getElementById("history")

div.innerHTML=""

history.reverse().forEach(day=>{

div.innerHTML+=`

<div class="card">

<b>${day.date}</b><br><br>

🚛 Driving: ${day.driving} h<br>
🔧 Work: ${day.work} h<br>
☕ Break: ${day.break} h<br>
⏳ POA: ${day.poa} h

</div>

`

})

}

loadHistory()

</script>
