<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EVRi HGV AI</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
display:flex;

background-image:url("https://images.unsplash.com/photo-1601584115197-04ecc0da31d7");
background-size:cover;
background-position:center;
}

/* overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(10,15,30,0.85);
z-index:-1;
}

/* sidebar */

.sidebar{
width:230px;
background:#020617;
padding:20px;
height:100vh;
box-shadow:0 0 20px black;
}

.sidebar h2{
color:#22c55e;
}

.sidebar div{
margin:15px 0;
cursor:pointer;
font-size:18px;
}

/* main */

.main{
flex:1;
padding:40px;
}

/* cards */

.card{
background:#1e293bcc;
padding:20px;
border-radius:12px;
margin:10px 0;
font-size:18px;
}

/* timer */

.timer{
font-size:55px;
margin:30px 0;
}

/* buttons */

button{
width:230px;
padding:16px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.drive{background:#22c55e;}
.work{background:#3b82f6;color:white;}
.break{background:#facc15;}
.poa{background:#a855f7;color:white;}
.stop{background:#ef4444;color:white;}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="sidebar">

<h2>EVRi HGV AI</h2>

<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('driving')">Driving Hours</div>
<div onclick="showPage('history')">History</div>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard">

<h1>Driver Dashboard</h1>

<div class="card">
Driving Today:
<span id="drivingToday">0</span> h
</div>

<div class="card">
Remaining Today:
<span id="remaining">9</span> h
</div>

</div>

<!-- DRIVING -->

<div id="driving" style="display:none">

<h1>Tachograph</h1>

<div class="timer" id="timer">
00:00:00
</div>

<button class="drive" onclick="setMode('DRIVING')">🚛 Driving</button>

<button class="work" onclick="setMode('WORK')">🔧 Work</button>

<button class="break" onclick="setMode('BREAK')">☕ Break</button>

<button class="poa" onclick="setMode('POA')">⏳ POA</button>

<button class="stop" onclick="setMode('STOP')">🛑 Stop</button>

</div>

<!-- HISTORY -->

<div id="history" style="display:none">

<h1>History</h1>

<div id="historyList"></div>

</div>

</div>

<script>

let mode="STOP"
let startTime=null
let driving=0

function showPage(page){

document.getElementById("dashboard").style.display="none"
document.getElementById("driving").style.display="none"
document.getElementById("history").style.display="none"

document.getElementById(page).style.display="block"

}

function setMode(m){

mode=m
startTime=Date.now()

}

setInterval(()=>{

if(startTime==null)return

let diff=(Date.now()-startTime)/1000

let h=Math.floor(diff/3600)
let m=Math.floor((diff%3600)/60)
let s=Math.floor(diff%60)

document.getElementById("timer").innerText =
String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0')

if(mode==="DRIVING"){

driving = diff/3600

document.getElementById("drivingToday").innerText =
driving.toFixed(2)

document.getElementById("remaining").innerText =
(9-driving).toFixed(2)

}

},1000)

  let work = 0
let breakTime = 0
let poa = 0
let lastModeTime = Date.now()

function saveModeTime(){

let now = Date.now()

let diff = (now - lastModeTime) / 3600000

if(mode==="DRIVING") driving += diff
if(mode==="WORK") work += diff
if(mode==="BREAK") breakTime += diff
if(mode==="POA") poa += diff

lastModeTime = now

}

function setMode(m){

saveModeTime()

mode = m

}

function endShift(){

saveModeTime()

let history = JSON.parse(localStorage.getItem("history") || "[]")

history.push({

date: new Date().toLocaleDateString(),

driving: driving.toFixed(2),
work: work.toFixed(2),
break: breakTime.toFixed(2),
poa: poa.toFixed(2)

})

localStorage.setItem("history", JSON.stringify(history))

alert("Shift saved!")

driving=0
work=0
breakTime=0
poa=0

}

</script>

</body>
</html>
