<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVRi HGV AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar div{
margin:20px 0;
cursor:pointer;
}

.main{
margin-left:240px;
padding:30px;
}

.timer{
font-size:50px;
margin:20px 0;
}

.mode{
font-size:22px;
color:#22c55e;
}

button{
display:block;
width:220px;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin:10px 0;
width:220px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>EVRi HGV AI</h2>

<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('tachograph')">Driving Hours</div>

</div>

<div class="main">

<div id="dashboard" class="page">

<h1>Driver Dashboard</h1>

<div class="card">
Driving Today:
<span id="driveToday">0</span> h
</div>

<div class="card">
Remaining Today:
<span id="remainToday">9</span> h
</div>

<div class="card">
Driving This Week:
<span id="weekDriving">0</span> h
</div>

<div class="card">
Extensions Used:
<span id="extensions">0</span> / 2
</div>

<div class="card">
Break needed after:
<span id="breakNeed">4h30</span>
</div>

</div>

<div id="tachograph" class="page" style="display:none">

<h1>Tachograph Mode</h1>

<div class="mode">
Mode: <span id="modeText">STOP</span>
</div>

<div class="timer" id="timer">
00:00:00
</div>

<button onclick="startDriving()">🚛 START DRIVING</button>
<button onclick="startBreak()">☕ BREAK</button>
<button onclick="startWork()">🔧 OTHER WORK</button>
<button onclick="startPOA()">⏳ POA</button>
<button onclick="stopAll()">🛑 STOP</button>

</div>

</div>

<script>

let mode="stop"

let timer=0
let drivingToday=0
let breakTime=0
let weekDriving=0
let extensions=0

function showPage(page){

let pages=document.querySelectorAll(".page")

pages.forEach(p=>p.style.display="none")

document.getElementById(page).style.display="block"

}

function startDriving(){

mode="driving"
document.getElementById("modeText").innerText="DRIVING"

}

function startBreak(){

mode="break"
document.getElementById("modeText").innerText="BREAK"

}

function startWork(){

mode="work"
document.getElementById("modeText").innerText="OTHER WORK"

}

function startPOA(){

mode="poa"
document.getElementById("modeText").innerText="POA"

}

function stopAll(){

mode="stop"
document.getElementById("modeText").innerText="STOP"

}

setInterval(function(){

if(mode=="stop") return

timer++

let h=Math.floor(timer/3600)
let m=Math.floor((timer%3600)/60)
let s=timer%60

document.getElementById("timer").innerText =
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

if(mode=="driving"){

drivingToday++

weekDriving++

}

updateDashboard()

},1000)

function updateDashboard(){

let driveHours=(drivingToday/3600).toFixed(2)

document.getElementById("driveToday").innerText=driveHours

let remain=(9-(drivingToday/3600)).toFixed(2)

if(remain<0) remain=0

document.getElementById("remainToday").innerText=remain

document.getElementById("weekDriving").innerText=(weekDriving/3600).toFixed(2)

document.getElementById("extensions").innerText=extensions

}

showPage("dashboard")

</script>

</body>

</html>
