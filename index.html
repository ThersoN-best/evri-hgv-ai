<!DOCTYPE html><html>
<head><title>EVRi HGV AI</title><style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:250px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
cursor:pointer;
}

.main{
margin-left:250px;
padding:30px;
}

.page{
display:none;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:10px;
}

</style></head><body><div class="sidebar"><h2>EVRi HGV AI</h2><a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('hours')">Driving Hours</a>
<a onclick="showPage('parking')">Truck Parking</a>
<a onclick="showPage('ai')">AI Assistant</a>
<a onclick="showPage('jobs')">Driver Jobs</a>

</div><div class="main"><div id="dashboard" class="page"><h1>Logistics Dashboard</h1><div class="cards"><div class="card">Drivers Online</div>
<div class="card">Active Jobs</div>
<div class="card">Vehicles</div></div></div><div id="hours" class="page"><h1>Driving Hours Calculator</h1><input placeholder="Hours driven today">
<button>Calculate</button></div><div id="parking" class="page"><h1>Truck Parking</h1><p>Truck parking map will appear here.</p></div><div id="ai" class="page"><h1>AI Driver Assistant</h1><input placeholder="Ask AI">
<button>Send</button></div><div id="jobs" class="page"><h1>Driver Jobs</h1><p>Available EVRi jobs will appear here.</p></div></div><script>

function showPage(page){

let pages=document.querySelectorAll(".page")

pages.forEach(p=>p.style.display="none")

document.getElementById(page).style.display="block"

}

showPage("dashboard")

</script></body></html>
