<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EVRi HGV AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar div{
margin:20px 0;
cursor:pointer;
}

.main{
margin-left:240px;
padding:30px;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:25px;
margin:15px 0;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

input{
padding:12px;
width:250px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="sidebar">

<h2>EVRi HGV AI</h2>

<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('hours')">Driving Hours</div>
<div onclick="showPage('parking')">Truck Parking</div>
<div onclick="showPage('ai')">AI Assistant</div>
<div onclick="showPage('jobs')">Driver Jobs</div>

</div>

<div class="main">

<div id="dashboard" class="page">

<h1>Logistics Dashboard</h1>

<div class="card">Drivers Online</div>
<div class="card">Active Jobs</div>
<div class="card">Vehicles</div>
<div class="card">Fuel Stations</div>

</div>

<div id="hours" class="page">

<h1>Driving Hours Calculator</h1>

<input id="hoursInput" placeholder="Enter hours driven">
<br>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

</div>

<div id="parking" class="page">

<h1>Truck Parking</h1>

<p>Truck parking map coming soon.</p>

</div>

<div id="ai" class="page">

<h1>AI Assistant</h1>

<input placeholder="Ask something">
<br><br>

<button>Send</button>

</div>

<div id="jobs" class="page">

<h1>Driver Jobs</h1>

<div class="card">HGV Night Driver</div>
<div class="card">Amazon Driver</div>

</div>

</div>

<script>

function showPage(page){

let pages=document.querySelectorAll(".page")

pages.forEach(p=>p.style.display="none")

document.getElementById(page).style.display="block"

}

function calculate(){

let h=document.getElementById("hoursInput").value

let result=9-h

document.getElementById("result").innerText="Remaining driving hours: "+result

}

showPage("dashboard")

</script>

</body>
</html>
