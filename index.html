<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width, initial-scale=1"><title>EVRi HGV AI</title><style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar button{
display:block;
width:100%;
background:none;
border:none;
color:white;
padding:12px;
text-align:left;
cursor:pointer;
font-size:16px;
}

.sidebar button:hover{
background:#1e293b;
}

.main{
margin-left:240px;
padding:40px;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
}

input{
padding:10px;
width:250px;
font-size:16px;
}

.green{
background:#22c55e;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}

</style></head><body><div class="sidebar"><h2>EVRi HGV AI</h2><button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('hours')">Driving Hours</button>
<button onclick="showPage('parking')">Truck Parking</button>
<button onclick="showPage('ai')">AI Assistant</button>
<button onclick="showPage('jobs')">Driver Jobs</button>

</div><div class="main"><div id="dashboard" class="page"><h1>Logistics Dashboard</h1><div class="card">Drivers Online</div>
<div class="card">Active Jobs</div>
<div class="card">Vehicles</div>
<div class="card">Fuel Stations</div></div><div id="hours" class="page"><h1>Driving Hours Calculator</h1><input id="hoursInput" placeholder="Enter hours"><br><button class="green" onclick="calc()">Calculate</button>

<p id="result"></p></div><div id="parking" class="page"><h1>Truck Parking</h1><p>Truck parking map coming soon.</p></div><div id="ai" class="page"><h1>AI Assistant</h1><input id="question" placeholder="Ask something"><br><button class="green" onclick="ask()">Send</button>

<p id="answer"></p></div><div id="jobs" class="page"><h1>Driver Jobs</h1><div class="card">HGV Night Driver</div>
<div class="card">Amazon Driver</div>
<div class="card">EVRi Driver</div></div></div><script>

function showPage(id){

var pages=document.querySelectorAll(".page");

pages.forEach(function(p){
p.style.display="none";
});

document.getElementById(id).style.display="block";

}

function calc(){

var h=document.getElementById("hoursInput").value;

if(h>9){
document.getElementById("result").innerHTML="⚠️ Over 9h driving limit";
}
else{
document.getElementById("result").innerHTML="✅ Driving time OK";
}

}

function ask(){

var q=document.getElementById("question").value;

document.getElementById("answer").innerHTML="AI response: "+q;

}

showPage("dashboard");

</script></body>
</html>
