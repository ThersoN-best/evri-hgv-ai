<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVRi HGV AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar div{
margin:20px 0;
cursor:pointer;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin:10px 0;
}

button{
padding:15px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

.timer{
font-size:40px;
margin:20px 0;
}

.warning{
color:#facc15;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>EVRi HGV AI</h2>

<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('driving')">Driving Hours</div>

</div>

<div class="main">

<div id="dashboard" class="page">

<h1>Driver Dashboard</h1>

<div class="card">
Driving Today: <span id="drivingToday">0</span> h
</div>

<div class="card">
Remaining Driving Today: <span id="remainingDrive">9</span> h
</div>

<div class="card">
Driving This Week: <span id="weeklyDrive">0</span> h
</div>

<div class="card">
Extensions Used: <span id="extensions">0</span> / 2
</div>

<div class="card warning">
Break needed after 4h30 driving
</div>

</div>

<div id="driving" class="page" style="display:none">

<h1>Tachograph Mode</h1>

<div class="timer" id="timer">00:00:00</div>

<button onclick="startDriving()">🚛 START DRIVING</button>
<button onclick="startBreak()">☕ BREAK</button>
<button onclick="startWork()">🔧 OTHER WORK</button>
<button onclick="startPOA()">⏳ POA</button>
<button onclick="stopAll()">🛑 STOP</button>

</div>

</div>

<script>

let mode="stop"

let seconds=0
let driving=0
let weekly=0
let extensions=0

function showPage(page){

let pages=document.querySelectorAll(".page")

pages.forEach(p=>p.style.display="none")

document.getElementById(page).style.display="block"

}

setInterval(function(){

seconds++

let h=Math.floor(seconds/3600)
let m=Math.floor((seconds%3600)/60)
let s=seconds%60

document.getElementById("timer").innerText=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

if(mode==="driving"){

driving++
weekly++

}

updateStats()

},1000)

function startDriving(){
mode="driving"
}

function startBreak(){
mode="break"
}

function startWork(){
mode="work"
}

function startPOA(){
mode="poa"
}

function stopAll(){
mode="stop"
}

function updateStats(){

let drivingHours=(driving/3600)

let weeklyHours=(weekly/3600)

if(drivingHours>9 && extensions<2){

extensions=1

}

let remaining=(9-drivingHours).toFixed(2)

document.getElementById("drivingToday").innerText=drivingHours.toFixed(2)

document.getElementById("remainingDrive").innerText=remaining

document.getElementById("weeklyDrive").innerText=weeklyHours.toFixed(2)

document.getElementById("extensions").innerText=extensions

}

showPage("dashboard")

</script>

</body>
</html>
