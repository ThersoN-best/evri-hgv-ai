<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EVRi HGV AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
}

/* sidebar */

.sidebar{
width:220px;
background:#020617;
padding:20px;
height:100vh;
}

.sidebar h2{
color:#22c55e;
}

.sidebar div{
margin:15px 0;
cursor:pointer;
}

/* main */

.main{
flex:1;
padding:40px;
}

/* cards */

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin:10px 0;
}

/* buttons */

button{
width:220px;
padding:15px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.drive{background:#22c55e;}
.work{background:#3b82f6;color:white;}
.break{background:#facc15;}
.poa{background:#a855f7;color:white;}
.stop{background:#ef4444;color:white;}

.timer{
font-size:40px;
margin:20px 0;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>EVRi HGV AI</h2>

<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('driving')">Driving Hours</div>
<div onclick="showPage('history')">History</div>

</div>

<div class="main">

<div id="dashboard">

<h1>Driver Dashboard</h1>

<div class="card">Driving Today: <span id="drivingToday">0</span> h</div>
<div class="card">Remaining Today: <span id="remaining">9</span> h</div>
<div class="card">Driving This Week: <span id="week">0</span> h</div>

</div>


<div id="driving" style="display:none">

<h1>Tachograph Mode</h1>

<div class="timer" id="timer">00:00:00</div>

<button class="drive" onclick="setMode('DRIVING')">🚛 Driving</button>
<button class="work" onclick="setMode('WORK')">🔧 Work</button>
<button class="break" onclick="setMode('BREAK')">☕ Break</button>
<button class="poa" onclick="setMode('POA')">⏳ POA</button>
<button class="stop" onclick="setMode('STOP')">🛑 Stop</button>

</div>


<div id="history" style="display:none">

<h1>Work History</h1>

<div id="historyList"></div>

</div>

</div>

<script>

let mode="STOP"
let start=null
let driving=0

function showPage(page){

document.getElementById("dashboard").style.display="none"
document.getElementById("driving").style.display="none"
document.getElementById("history").style.display="none"

document.getElementById(page).style.display="block"

}

function setMode(m){

mode=m
start=Date.now()

}

setInterval(()=>{

if(start==null)return

let diff=(Date.now()-start)/1000

let h=Math.floor(diff/3600)
let m=Math.floor(diff%3600/60)
let s=Math.floor(diff%60)

document.getElementById("timer").innerText=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

if(mode==="DRIVING"){

driving=diff/3600

document.getElementById("drivingToday").innerText=
driving.toFixed(2)

document.getElementById("remaining").innerText=
(9-driving).toFixed(2)

}

},1000)

</script>

</body>
</html>
