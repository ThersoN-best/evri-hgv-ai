<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVRi HGV AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar div{
margin:20px 0;
cursor:pointer;
}

.main{
margin-left:240px;
padding:30px;
}

.timer{
font-size:50px;
margin:20px 0;
}

.mode{
font-size:22px;
color:#22c55e;
margin-bottom:20px;
}

button{
display:block;
width:220px;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>EVRi HGV AI</h2>

<div onclick="showPage('dashboard')">Dashboard</div>
<div onclick="showPage('driving')">Driving Hours</div>

</div>

<div class="main">

<div id="dashboard" class="page">

<h1>Driver Dashboard</h1>

<p>Driving Today: <span id="driveToday">0</span> h</p>
<p>Break Today: <span id="breakToday">0</span> m</p>

</div>

<div id="driving" class="page" style="display:none">

<h1>Tachograph Mode</h1>

<div class="mode">
Current Mode: <span id="modeText">STOP</span>
</div>

<div class="timer" id="timer">00:00:00</div>

<button onclick="setMode('driving')">🚛 START DRIVING</button>
<button onclick="setMode('break')">☕ BREAK / REST</button>
<button onclick="setMode('work')">🔧 OTHER WORK</button>
<button onclick="setMode('poa')">⏳ POA</button>
<button onclick="setMode('stop')">🛑 STOP</button>

</div>

</div>

<script>

let mode="stop"

let timer=0
let driving=0
let breakTime=0

function showPage(page){

let pages=document.querySelectorAll(".page")

pages.forEach(p=>p.style.display="none")

document.getElementById(page).style.display="block"

}

function setMode(newMode){

mode=newMode

document.getElementById("modeText").innerText=newMode.toUpperCase()

}

setInterval(function(){

if(mode==="stop") return

timer++

let h=Math.floor(timer/3600)
let m=Math.floor((timer%3600)/60)
let s=timer%60

document.getElementById("timer").innerText=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

if(mode==="driving") driving++
if(mode==="break") breakTime++

updateDashboard()

},1000)

function updateDashboard(){

let driveHours=(driving/3600).toFixed(2)

let breakMin=Math.floor(breakTime/60)

document.getElementById("driveToday").innerText=driveHours

document.getElementById("breakToday").innerText=breakMin

}

showPage("dashboard")

</script>

</body>
</html>
